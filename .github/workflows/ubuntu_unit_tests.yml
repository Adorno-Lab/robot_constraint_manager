name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Xvfb and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Start virtual display
      run: |
        sudo /usr/bin/Xvfb :99 -screen 0 1280x1024x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
    
    - name: Run Docker Compose tests
      working-directory: devel/compose_coppeliasim_tests
      run: |
        docker compose up --abort-on-container-exit --exit-code-from ubuntu_dev
    
    - name: Get logs on failure
      if: failure()
      working-directory: devel/compose_coppeliasim_tests
      run: |
        docker compose logs coppeliasim
        docker compose logs ubuntu_dev
    
    - name: Cleanup
      if: always()
      working-directory: devel/compose_coppeliasim_tests
      run: |
        docker compose down
